# Enable stage-based action masking for training.
enabled: true
# Promotion metric uses the mean over the last N completed episodes.
# Example: 10 means "average the last 10 episodes before checking the trigger".
smoothing_episodes: 1
# Hard minimum number of completed episodes to stay in this stage before
# promotion is even allowed, even if the smoothed trigger is already satisfied.
min_stage_episodes: 3
# Ordered curriculum stages; later stages override only the listed action heads.
stages:
  - name: basic_drive
    until:
      # Promote once one completed episode averages all 3 race laps.
      race_laps_completed_mean_gte: 3.0
    action_mask:
      # Keep lean actions disabled until the agent can finish the race.
      lean: [idle]
  - name: lean_enabled
    action_mask:
      # Re-enable the full lean branch after the finish trigger is met.
      lean: [idle, left, right]
