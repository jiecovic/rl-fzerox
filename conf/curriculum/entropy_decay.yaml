# PPO fine-tuning curriculum. Start exploratory/aggressive, then reduce update
# pressure once the agent reliably reaches later race phases.
enabled: true
# Promotion metric uses the mean over the last N completed episodes.
smoothing_episodes: 10
# Stay in each stage for at least this many completed episodes.
min_stage_episodes: 20
stages:
  - name: explore
    train:
      learning_rate: 2.0e-4
      n_epochs: 5
      clip_range: 0.2
      ent_coef: 0.01
    until:
      # Promote after the policy usually completes at least one lap.
      race_laps_completed_mean_gte: 1.0
  - name: stabilize
    train:
      learning_rate: 1.0e-4
      n_epochs: 3
      clip_range: 0.15
      ent_coef: 0.003
    until:
      # Promote after the policy usually finishes the full race.
      race_laps_completed_mean_gte: 3.0
  - name: finetune
    train:
      learning_rate: 3.0e-5
      n_epochs: 2
      clip_range: 0.1
      ent_coef: 0.0
