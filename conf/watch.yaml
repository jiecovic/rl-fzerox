defaults:
  - reward: race_v3
  - _self_

seed: 123

emulator:
  core_path: local/libretro/mupen64plus_next_libretro.so
  rom_path: local/roms/F-Zero X (USA).n64
  renderer: angrylion

env:
  action_repeat: 2
  max_episode_steps: 50000
  stuck_min_speed_kph: 60.0
  # Truncate if this many internal frames pass without beating the best race-distance frontier.
  progress_frontier_stall_limit_frames: 900
  # Require at least this much new race-distance to reset the frontier stall timer.
  progress_frontier_epsilon: 100.0
  # Mask manual boost below this normalized energy fraction, even after boost unlocks.
  boost_min_energy_fraction: 0.10
  # Optional fallback for old experiments; normal terminal detection uses game state
  # such as spinning out, crashing, retiring, or falling off track.
  terminate_on_energy_depleted: false
  randomize_game_rng_on_reset: true
  randomize_game_rng_requires_race_mode: true
  # Optional race camera target applied after reset via in-game C-Right taps.
  # Values: overhead, close_behind, regular, wide. null preserves the current camera.
  camera_setting: close_behind
  reset_to_race: true
  # 39 is the first gameplay-active GO frame; null keeps the raw baseline timing.
  race_intro_target_timer: 39
  # For multi-track sampling, keep selected savestates in memory after first use.
  cache_track_baselines: true
  action:
    name: steer_drive_boost_lean
    steer_buckets: 7
    lean_mode: release_cooldown
  observation:
    # image keeps screen-only obs; image_state adds the scalar telemetry vector.
    mode: image_state
    preset: crop_116x164
    frame_stack: 4
    minimap_layer: false

watch:
  # Env/policy step rate. `auto` means native_fps / action_repeat; use
  # `unlimited` or a number above native FPS for fast-forward watch.
  control_fps: auto
  # UI redraw cap. 60 is a conservative cross-platform default; control speed
  # can still be much faster and will render snapshots at this cadence.
  render_fps: 60
  deterministic_policy: true
  device: cpu
