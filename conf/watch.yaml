defaults:
  - reward: race_v2
  - _self_

seed: 123

emulator:
  core_path: local/libretro/mupen64plus_next_libretro.so
  rom_path: local/roms/F-Zero X (USA).n64
  renderer: angrylion

env:
  action_repeat: 2
  max_episode_steps: 12000
  stuck_step_limit: 240
  stuck_min_speed_kph: 50.0
  wrong_way_timer_limit: 300
  reset_to_race: true
  action:
    name: steer_drive_boost
    steer_buckets: 7
  observation:
    preset: native_crop_v3
    frame_stack: 4
