# Track registry entry for one concrete race-start baseline.
#
# The `track` section is metadata persisted into run manifests. The `emulator`
# section is the actual config value consumed by training/watch.
track:
  id: big_blue_time_attack_blue_falcon_balanced
  display_name: "Big Blue Time Attack - Blue Falcon Balanced"
  course_ref: jack/big_blue
  mode: time_attack
  vehicle: blue_falcon
  engine_setting: balanced
  baseline_state_path: checkpoints/baselines/jack/big-blue-time-attack-blue-falcon-balanced-no-ghost-go-window.state
  notes: "Big Blue time-attack baseline."

emulator:
  baseline_state_path: ${track.baseline_state_path}
