# Track registry entry for one concrete race-start baseline.
#
# The `track` section is metadata persisted into run manifests. The `emulator`
# section is the actual config value consumed by training/watch.
track:
  id: port_town_time_attack_blue_falcon_balanced
  display_name: "Port Town Time Attack - Blue Falcon Balanced"
  course_ref: jack/port_town
  mode: time_attack
  vehicle: blue_falcon
  engine_setting: balanced
  baseline_state_path: checkpoints/baselines/jack/port-town-time-attack-blue-falcon-balanced-no-ghost-go-window.state
  notes: "Port Town time-attack baseline."

emulator:
  baseline_state_path: ${track.baseline_state_path}
