# Track registry entry for one concrete race-start baseline.
#
# The `track` section is metadata persisted into run manifests. The `emulator`
# section is the actual config value consumed by training/watch.
track:
  id: mute_city_time_attack_blue_falcon_balanced
  display_name: "Mute City Time Attack - Blue Falcon Balanced"
  course_ref: jack/mute_city
  mode: time_attack
  vehicle: blue_falcon
  engine_setting: balanced
  baseline_state_path: checkpoints/baselines/jack/mute-city-time-attack-blue-falcon-balanced-no-ghost-go-window.state
  notes: "Mute City time-attack baseline."

emulator:
  baseline_state_path: ${track.baseline_state_path}
