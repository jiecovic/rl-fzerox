defaults:
  - /watch
  - _self_

seed: 123

emulator:
  baseline_state_path: local/states/first-race.state
  renderer: angrylion

env:
  reset_to_race: true
  camera_setting: close_behind
  action:
    name: steer_drive_boost_drift

watch:
  control_fps: auto
  render_fps: 60
  deterministic_policy: true
