defaults:
  - /train_ppo_base
  - /local/train.local.base@_global_
  - _self_

env:
  action:
    # First recurrent-hybrid test: continuous steer/drive plus discrete shoulder only.
    name: hybrid_steer_drive_shoulder
    # PWM maps -1 to coast, negative values to partial gas, and 0+ to full gas.
    continuous_drive_mode: pwm
    continuous_drive_deadzone: 0.0

train:
  algorithm: hybrid_recurrent_ppo
  run_name: ppo_hybrid_recurrent_cnn
  init_run_dir: null
  init_artifact: latest
  ent_coef: 0.0

policy:
  recurrent:
    enabled: true
    hidden_size: 512
    n_lstm_layers: 1
    shared_lstm: false
    enable_critic_lstm: true
