defaults:
  - /train_ppo_base
  - /local/train.local.base@_global_
  - _self_

env:
  # Mask manual boost below 20% energy for this continuation run.
  boost_min_energy_fraction: 0.40
  action:
    # Maskable recurrent hybrid PPO: continuous steer/drive/air-brake plus shoulder primitive and boost.
    # Shoulder values 3..6 reserve future side-attack/spin primitives and are masked by default.
    name: hybrid_steer_drive_boost_shoulder_primitive
    # Continue 0014 with gas held at 100%; the policy still keeps the drive
    # axis shape, but the env ignores it for accelerate.
    continuous_drive_mode: always_accelerate
    continuous_drive_deadzone: 0.0
    # Keep the 0009 policy shape, but clear air brake whenever telemetry says grounded.
    continuous_air_brake_mode: disable_on_ground
    # Try vanilla-ish shoulder semantics: release immediately, then mask re-taps through the dash window.
    shoulder_slide_mode: release_cooldown
    # Keep boost unavailable when already fast; can_boost/energy/active-boost gates still apply.
    boost_unmask_max_speed_kph: 800.0
    # Keep shoulder input unavailable at low speed, without hard-masking it forever.
    shoulder_unmask_min_speed_kph: 1000.0

reward:
  # Keep forced full gas, but teach the ignored drive axis to stop asking for coast.
  drive_axis_negative_penalty_scale: -0.01

train:
  algorithm: maskable_hybrid_recurrent_ppo
  run_name: ppo_maskable_hybrid_recurrent_cnn
  init_run_dir: local/runs/ppo_maskable_hybrid_recurrent_cnn_0022
  init_artifact: latest
  ent_coef: 0.0
  n_steps: 2048
  batch_size: 256
  learning_rate: 1.5e-4

policy:
  recurrent:
    enabled: true
    hidden_size: 512
    n_lstm_layers: 1
    shared_lstm: false
    enable_critic_lstm: true
