defaults:
  - /train_ppo_base
  - /local/train.local.base@_global_
  - _self_

env:
  action:
    # Hybrid maskable PPO gets continuous steer/drive plus discrete shoulder and boost heads.
    name: hybrid_steer_drive_boost_shoulder
    # PWM maps -1 to coast, negative values to partial gas, and 0+ to full gas.
    continuous_drive_mode: pwm
    continuous_drive_deadzone: 0.0

train:
  algorithm: maskable_hybrid_action_ppo
  run_name: ppo_maskable_hybrid_cnn
  init_run_dir: local/runs/ppo_maskable_hybrid_cnn_0002
  init_artifact: latest
