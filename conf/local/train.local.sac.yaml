defaults:
  - /local/train.local@_global_
  - _self_

env:
  action:
    # SAC uses continuous steering/throttle axes; boost and drift stay disabled for this experiment.
    name: continuous_steer_drive
    # PWM preserves throttle magnitude while still emitting the game's binary button input.
    continuous_drive_mode: pwm
    # Axis 1 maps to throttle duty cycle: values > 0 throttle over time, values <= 0 coast.
    continuous_drive_deadzone: 0.0
  observation:
    # Smallest current image preset: 84x116 per RGB frame before frame stacking.
    preset: native_crop_v1

train:
  algorithm: sac
  vec_env: subproc
  num_envs: 2
  run_name: sac_cnn
  init_run_dir: null
  init_artifact: latest
  total_timesteps: 10_000_000
  # Dict replay buffer stores image and next_image, so keep this conservative on 32 GB RAM.
  buffer_size: 30_000
  learning_starts: 5_000
  train_freq: 4
  gradient_steps: 2
  batch_size: 128
  learning_rate: 3.0e-4
  tau: 0.005
  gamma: 0.992
  ent_coef: auto
  target_entropy: auto
  optimize_memory_usage: false
  device: cuda
  save_freq: 10_000
