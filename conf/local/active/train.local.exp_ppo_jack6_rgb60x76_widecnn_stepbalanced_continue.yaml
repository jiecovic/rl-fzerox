# Continue the current Jack Cup RGB wide-CNN PPO run with adaptive track
# sampling. The sampler keeps initial map weights equal, then periodically
# shifts reset weights so completed training frames trend toward equal coverage.
defaults:
  - /local/active/train.local.exp_ppo_jack6_rgb60x76_widecnn_fork@_global_
  - _self_

env:
  track_sampling:
    sampling_mode: step_balanced
    step_balance_update_episodes: 50
    step_balance_ema_alpha: 0.1
    step_balance_max_weight_scale: 5.0

train:
  run_name: exp_ppo_jack6_a2_rgb60x76_minimap_fullctrl_open_widecnn_stepbalanced
  resume_run_dir: local/runs/exp_ppo_jack6_a2_rgb60x76_minimap_fullctrl_open_widecnn_0001
  resume_artifact: latest
  resume_mode: full_model
