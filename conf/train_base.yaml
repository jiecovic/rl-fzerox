defaults:
  - reward: race_v2
  - curriculum: none
  - _self_

seed: 123

emulator:
  core_path: local/libretro/mupen64plus_next_libretro.so
  rom_path: local/roms/F-Zero X (USA).n64
  renderer: angrylion

env:
  action_repeat: 1
  max_episode_steps: 50000
  stuck_step_limit: 240
  stuck_min_speed_kph: 60.0
  wrong_way_timer_limit: 120
  # Truncate if this many internal frames pass without beating the best race-distance frontier.
  progress_frontier_stall_limit_frames: 400
  # Require at least this much new race-distance to reset the frontier stall timer.
  progress_frontier_epsilon: 100.0
  # Mask manual boost below this normalized energy fraction, even after boost unlocks.
  boost_min_energy_fraction: 0.5
  # End the episode immediately when race telemetry shows player energy <= 0.
  terminate_on_energy_depleted: true
  randomize_game_rng_on_reset: true
  randomize_game_rng_requires_race_mode: true
  # Optional race camera target applied after reset via in-game C-Right taps.
  # Values: overhead, close_behind, regular, wide. null preserves the current camera.
  camera_setting: close_behind
  reset_to_race: true
  action:
    name: steer_drive_boost_drift
    steer_buckets: 9
    # Optional live speed gate for shoulder/drift actions.
    # null disables it; 0 allows drift immediately; e.g. 500 masks drift below 500 km/h.
    drift_unmask_min_speed_kph: null
  observation:
    # image keeps screen-only obs; image_state adds the scalar telemetry vector.
    mode: image_state
    preset: native_crop_v3
    frame_stack: 4

train:
  verbose: 0
  device: cuda
  save_freq: 10_000
  output_root: local/runs

policy:
  activation: tanh
  extractor:
    features_dim: 1024
    state_features_dim: 64
  recurrent:
    # Enable the LSTM-based policy path only with train.algorithm=maskable_recurrent_ppo.
    enabled: false
    # LSTM hidden-state width used after the shared feature extractor.
    hidden_size: 512
    # Number of stacked LSTM layers in the recurrent policy core.
    n_lstm_layers: 1
    # Whether actor and critic should share the same LSTM weights.
    shared_lstm: false
    # Keep a dedicated critic LSTM instead of reusing the actor sequence state.
    enable_critic_lstm: true
  net_arch:
    pi: [512, 256]
    vf: [512]
