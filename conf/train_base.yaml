defaults:
  - reward: race_v3
  - curriculum: none
  - _self_

seed: 123

emulator:
  core_path: local/libretro/mupen64plus_next_libretro.so
  rom_path: local/roms/F-Zero X (USA).n64
  renderer: angrylion

env:
  action_repeat: 1
  max_episode_steps: 50000
  # If false, low-speed/stuck detection is still visible in info/HUD but no
  # longer ends the episode directly.
  stuck_truncation_enabled: true
  stuck_step_limit: 240
  stuck_min_speed_kph: 60.0
  # If false, reverse driving no longer truncates directly; progress-frontier
  # stall can still stop episodes that stop making useful forward progress.
  wrong_way_truncation_enabled: true
  wrong_way_timer_limit: 240
  # Truncate if this many internal frames pass without beating the best race-distance frontier.
  progress_frontier_stall_limit_frames: 400
  # Require at least this much new race-distance to reset the frontier stall timer.
  progress_frontier_epsilon: 100.0
  # Mask manual boost below this normalized energy fraction, even after boost unlocks.
  boost_min_energy_fraction: 0.5
  # Optional fallback for old experiments; normal terminal detection uses game state
  # such as spinning out, crashing, retiring, or falling off track.
  terminate_on_energy_depleted: false
  randomize_game_rng_on_reset: true
  randomize_game_rng_requires_race_mode: true
  # Optional race camera target applied after reset via in-game C-Right taps.
  # Values: overhead, close_behind, regular, wide. null preserves the current camera.
  camera_setting: close_behind
  reset_to_race: true
  # When reset lands during the race intro, wait until this countdown timer.
  # 39 is the first gameplay-active GO frame; null keeps the raw baseline timing.
  race_intro_target_timer: 39
  # For multi-track sampling, read each configured savestate once per worker and
  # restore from memory on later resets. Disable only if baseline RAM becomes a problem.
  cache_track_baselines: true
  action:
    name: steer_drive_boost_lean
    steer_buckets: 5
    # Z/R lean semantics:
    # - minimum_hold: force a pressed lean input to stay held through the tap window.
    # - release_cooldown: release immediately, then mask re-presses through the tap window.
    # - timer_assist: allow arbitrary short taps by patching the game's lean timers.
    lean_mode: release_cooldown
    # Optional live speed cap for manual boost.
    # Boost still requires can_boost, enough energy, grounded state, and no active boost.
    # null disables only this speed gate.
    boost_unmask_max_speed_kph: null
    # Optional live speed gate for lean actions.
    # null disables it; 0 allows lean input immediately; e.g. 500 masks it below 500 km/h.
    lean_unmask_min_speed_kph: null
  observation:
    # image keeps screen-only obs; image_state adds the scalar telemetry vector.
    mode: image_state
    preset: crop_116x164
    frame_stack: 4

train:
  verbose: 0
  device: cuda
  save_freq: 10_000
  output_root: local/runs

policy:
  activation: tanh
  extractor:
    features_dim: 1024
    state_features_dim: 64
  recurrent:
    # Enable the LSTM policy path only with a recurrent PPO-family algorithm.
    enabled: false
    # LSTM hidden-state width used after the shared feature extractor.
    hidden_size: 512
    # Number of stacked LSTM layers in the recurrent policy core.
    n_lstm_layers: 1
    # Whether actor and critic should share the same LSTM weights.
    shared_lstm: false
    # Keep a dedicated critic LSTM instead of reusing the actor sequence state.
    enable_critic_lstm: true
  net_arch:
    pi: [512, 256]
    vf: [512]
