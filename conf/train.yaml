defaults:
  - reward: race_v2
  - _self_

seed: 123

emulator:
  core_path: local/libretro/mupen64plus_next_libretro.so
  rom_path: local/roms/F-Zero X (USA).n64
  renderer: angrylion

env:
  action_repeat: 2
  max_episode_steps: 44000
  stuck_step_limit: 360
  stuck_min_speed_kph: 60.0
  wrong_way_timer_limit: 360
  reset_to_race: true
  action:
    name: steer_drive_boost
    steer_buckets: 7
  observation:
    preset: native_crop_v3
    frame_stack: 4
train:
  vec_env: subproc
  num_envs: 4
  total_timesteps: 5_000_000
  n_steps: 1024
  n_epochs: 6
  batch_size: 512
  learning_rate: 1.0e-4
  gamma: 0.993
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 0
  device: cuda
  save_freq: 10_000
  output_root: local/runs
  run_name: ppo_cnn

policy:
  activation: tanh
  extractor:
    features_dim: 512
  net_arch:
    pi: [512]
    vf: [512]
