defaults:
  - reward: race_v2
  - curriculum: none
  - _self_

seed: 123

emulator:
  core_path: local/libretro/mupen64plus_next_libretro.so
  rom_path: local/roms/F-Zero X (USA).n64
  renderer: angrylion

env:
  action_repeat: 2
  max_episode_steps: 50000
  stuck_step_limit: 240
  stuck_min_speed_kph: 60.0
  wrong_way_timer_limit: 120
  # End the episode immediately when race telemetry shows player energy <= 0.
  terminate_on_energy_depleted: true
  randomize_game_rng_on_reset: true
  randomize_game_rng_requires_race_mode: true
  reset_to_race: true
  action:
    name: steer_drive_boost_drift
    steer_buckets: 9
  observation:
    # image keeps screen-only obs; image_state adds the scalar telemetry vector.
    mode: image_state
    preset: native_crop_v3
    frame_stack: 4
train:
  # auto resolves to MaskablePPO whenever action masks or curriculum are enabled.
  algorithm: auto
  vec_env: subproc
  num_envs: 8
  total_timesteps: 50_000_000
  n_steps: 1024
  n_epochs: 10
  batch_size: 256
  learning_rate: 3.0e-4
  gamma: 0.992
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 0
  device: cuda
  save_freq: 10_000
  output_root: local/runs
  run_name: ppo_cnn

policy:
  activation: tanh
  extractor:
    features_dim: 1024
    state_features_dim: 64
  net_arch:
    pi: [512, 256]
    vf: [512]
