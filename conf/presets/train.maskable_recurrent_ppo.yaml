defaults:
  - /train_ppo_base
  - /presets/local_runtime@_global_
  - _self_

train:
  algorithm: maskable_recurrent_ppo
  run_name: ppo_discrete_full_gas_recurrent_cnn
  init_run_dir: null
  init_artifact: latest
  ent_coef: 0.0
  n_steps: 2048
  batch_size: 1024
  clip_range: 0.15
  gamma: 0.992
  learning_rate: 3.0e-5
  n_epochs: 5

env:
  action:
    # Simple digital-control experiment: left/neutral/right steering plus
    # independent gas/air-brake buttons. Air brake, boost, and lean stay in
    # the policy shape so they can be unmasked later without starting over.
    name: steer_gas_air_brake_boost_lean
    steer_buckets: 3
    # Masks list allowed action values, not blocked values.
    # Omitted branches keep all values available; here steer=[0,1,2].
    mask:
      # Force full gas while preserving the policy head.
      gas: [engaged]
      air_brake: [idle]
      boost: [idle, engaged]
      lean: [idle, left, right]
    # These gates only matter once the explicit boost/lean masks above are relaxed.
    boost_unmask_max_speed_kph: 835.0
    lean_unmask_min_speed_kph: 880.0
  observation:
    # Lightweight recurrent experiment: smallest image preset and no frame stack.
    preset: crop_84x116
    frame_stack: 1
    # Adds current left/right steer flags plus signed recent steer pressure.
    state_profile: steer_history
  boost_min_energy_fraction: 0.25

policy:
  extractor:
    features_dim: 512
    state_features_dim: 32
  recurrent:
    enabled: true
    hidden_size: 256
    n_lstm_layers: 1
    shared_lstm: false
    enable_critic_lstm: true
  net_arch:
    pi: [256, 64]
    vf: [256]
