defaults:
  - /train_ppo_base
  - /presets/local_runtime@_global_
  - _self_

env:
  action:
    # Continuous steer and PWM gas plus discrete lean/boost heads.
    branches:
      steer:
        type: continuous
      gas:
        type: continuous
      boost:
        type: discrete
      lean:
        type: discrete

train:
  algorithm: maskable_hybrid_action_ppo
  run_name: ppo_maskable_hybrid_cnn
  resume_run_dir: null
  resume_artifact: latest
