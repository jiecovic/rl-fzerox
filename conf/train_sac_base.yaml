defaults:
  - train_base
  - _self_

env:
  action:
    # SAC uses continuous steering/accelerate axes; boost and lean stay disabled here.
    name: continuous_steer_drive
    # -1 coasts, +1 saturates to full throttle, and the thresholds shape the ramp.
    continuous_drive_deadzone: 0.05
    continuous_drive_full_threshold: 0.85
    continuous_drive_min_thrust: 0.25

train:
  algorithm: sac
  vec_env: subproc
  num_envs: 2
  run_name: sac_cnn
  total_timesteps: 10_000_000
  # Dict replay buffer stores image and next_image, so keep this conservative on 32 GB RAM.
  buffer_size: 30_000
  learning_starts: 5_000
  train_freq: 8
  gradient_steps: 2
  batch_size: 128
  learning_rate: 3.0e-4
  tau: 0.005
  gamma: 0.992
  ent_coef: auto
  target_entropy: auto
  optimize_memory_usage: false

policy:
  net_arch:
    # SAC maps the shared schema's vf list to SB3's qf critic head.
    pi: [512, 256]
    vf: [512]
