# Reward profile registry name.
name: race_v2

# Time pressure: small negative reward per internal emulator frame.
time_penalty_per_frame: -0.005
# Time pressure: multiplier applied to the per-frame time penalty once the
# game's reverse-warning HUD threshold (`reverse_timer >= 100`) is active.
reverse_time_penalty_scale: 2.0

# Milestones: absolute race-distance interval between one-time milestone rewards.
milestone_distance: 3000.0
# Milestones: one-time bonus for crossing a new race-distance milestone.
milestone_bonus: 2.0

# Lap rewards: one-time bonus for completing lap 1.
lap_1_completion_bonus: 20.0
# Lap rewards: one-time bonus for completing lap 2.
lap_2_completion_bonus: 35.0
# Lap rewards: one-time bonus for completing the race's final lap.
final_lap_completion_bonus: 60.0
# Lap rewards: small placement bonus scale paid at each completed lap as
# `(total_racers - position) * lap_position_scale`.
lap_position_scale: 1.0

# Failure shaping: extra penalty per unfinished lap on death or truncation.
remaining_lap_penalty: 50.0

# Energy: ignore tiny energy changes below this threshold.
energy_loss_epsilon: 0.01
# Energy: penalty scale applied to lost energy within one env step.
energy_loss_penalty_scale: 0.05
# Energy: smaller reward scale applied to regained energy within one env step.
energy_gain_reward_scale: 0.02

# Minor events: entry-only penalty when the machine enters collision recoil.
collision_recoil_penalty: -2.0
# Minor events: entry-only penalty when the machine enters a spin-out.
spinning_out_penalty: -4.0

# Failure bases: base penalty when the episode ends by crash, retire, or off-track failure.
terminal_failure_base_penalty: -120.0
# Failure bases: base penalty when the episode truncates for being stuck.
stuck_truncation_base_penalty: -150.0
# Failure bases: base penalty when the episode truncates for driving the wrong way.
wrong_way_truncation_base_penalty: -170.0
# Failure bases: base penalty when the episode truncates by hitting max episode steps.
timeout_truncation_base_penalty: -150.0

# Finish placement: larger final placement bonus on actual race finish as
# `(total_racers - position) * finish_position_scale`.
finish_position_scale: 4.0
