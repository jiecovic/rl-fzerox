# Reward profile registry name.
name: race_v2

# Time pressure: small negative reward per internal emulator frame.
time_penalty_per_frame: -0.001
# Time pressure: multiplier applied to the per-frame time penalty whenever the
# game's live reverse timer is active (`reverse_timer > 0`).
reverse_time_penalty_scale: 4.0
# Time pressure: multiplier applied to the per-frame time penalty on frames
# below the env's configured stuck-speed threshold.
low_speed_time_penalty_scale: 4.0

# Milestones: episode-relative progress interval between one-time milestone rewards.
milestone_distance: 15000.0
# Milestones: shift the whole milestone grid by one deterministic random phase
# offset on each reset so the agent does not overfit to exact boundary locations.
randomize_milestone_phase_on_reset: true
# Milestones: one-time bonus for crossing a new race-distance milestone.
milestone_bonus: 2.0
# Milestones: extra reward scale for average progress per internal frame since
# the previously crossed milestone.
milestone_speed_scale: 0.05
# Milestones: maximum extra speed reward paid per crossed milestone.
milestone_speed_bonus_cap: 2.0
# Bootstrap progress: dense reward scale for positive race-distance delta during
# the configured lap warmup window.
bootstrap_progress_scale: 0.002
# Bootstrap progress: stronger penalty scale for negative race-distance delta
# during the configured lap warmup window.
bootstrap_regress_penalty_scale: 0.004
# Bootstrap progress: max extra dense progress multiplier for better race
# position; first place gets `1 + scale`, last place stays `1.0`.
bootstrap_position_multiplier_scale: 0.25
# Bootstrap progress: how many initial completed laps allow dense progress reward.
bootstrap_lap_count: 3

# Lap rewards: one-time bonus for completing lap 1.
lap_1_completion_bonus: 20.0
# Lap rewards: one-time bonus for completing lap 2.
lap_2_completion_bonus: 35.0
# Lap rewards: one-time bonus for completing the race's final lap.
final_lap_completion_bonus: 60.0
# Lap rewards: small placement bonus scale paid at each completed lap as
# `(total_racers - position) * lap_position_scale`.
lap_position_scale: 1.0

# Failure shaping: extra penalty per remaining internal emulator frame on
# death or truncation.
remaining_step_penalty_per_frame: 0.0
# Failure shaping: extra penalty per unfinished lap on death or truncation.
remaining_lap_penalty: 50.0

# Energy: ignore tiny energy changes below this threshold.
energy_loss_epsilon: 0.01
# Energy: maximum penalty scale for lost energy when post-step energy is near zero.
energy_loss_penalty_scale: 0.10
# Energy: above this post-step energy fraction, energy loss is not penalized.
energy_loss_safe_fraction: 0.90
# Energy: curve exponent for danger weighting; higher stays mild until lower energy.
energy_loss_danger_power: 2.0
# Energy: smaller reward scale applied to regained energy within one env step.
energy_gain_reward_scale: 0.02
# Energy: suppress energy-gain reward for this many internal frames after
# entering collision recoil.
energy_gain_collision_cooldown_frames: 120
# Energy: one-time bonus when energy crosses from below full to full.
energy_full_refill_bonus: 1.0
# Air control: one-time reward when the machine transitions from airborne back
# to grounded on an env-step boundary.
airborne_landing_reward: 5.0
# Boost pads: small reward when entering a dash-pad boost state.
boost_pad_reward: 0.25
# Boost pads: internal-frame cooldown before the boost-pad reward can fire again.
boost_pad_reward_cooldown_frames: 30
# Boost discipline: small fixed penalty per env step when manual boost is requested.
boost_press_penalty: -0.01

# Minor events: entry-only penalty when the machine enters collision recoil.
collision_recoil_penalty: -5.0
# Minor events: entry-only penalty when the machine enters a spin-out.
spinning_out_penalty: -0.5

# Failure bases: base penalty when the episode ends by crash, retire, or off-track failure.
terminal_failure_base_penalty: -100.0
# Failure bases: base penalty when the episode truncates for being stuck.
stuck_truncation_base_penalty: -120.0
# Failure bases: base penalty when the episode truncates for driving the wrong way.
wrong_way_truncation_base_penalty: -120.0
# Failure bases: base penalty when the episode truncates for making no new
# race-distance frontier progress for too long.
progress_stalled_truncation_base_penalty: -120.0
# Failure bases: base penalty when the episode truncates by hitting max episode steps.
timeout_truncation_base_penalty: -120.0

# Finish placement: larger final placement bonus on actual race finish as
# `(total_racers - position) * finish_position_scale`.
finish_position_scale: 4.0
