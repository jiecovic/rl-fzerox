# Progress-bucket reward profile:
# - treats the game spline centerline as the reference trajectory
# - divides that trajectory into equally spaced progress buckets
# - pays only newly covered buckets
# - uses discounting as the main speed pressure
# - keeps terminal/lap bonuses modest
name: race_v3

# Spline coverage: distance between equally spaced reward points on the game spline.
progress_bucket_distance: 25.0
# Spline coverage: reward for each newly covered point.
progress_bucket_reward: 0.05
# Spline coverage: accumulate crossed-point rewards over this many internal frames before paying.
progress_reward_interval_frames: 1

# Time pressure: off by default for this frontier-progress profile.
time_penalty_per_frame: 0.0
reverse_time_penalty_scale: 1.0
low_speed_time_penalty_scale: 1.0

# Lap rewards: flat per-lap marker plus small position pressure. The finish line is
# just the final lap completion, not a separate bonus event.
lap_completion_bonus: 5.0
# Lap position bonus is `(total_racers - position) * lap_position_scale`.
lap_position_scale: 0.25

# Failure shaping: flat terminal pressure; frontier-stall truncation is still
# controlled by env.progress_frontier_stall_limit_frames.
# Game-ending failures: spin-out/death, crash, fall-off, or retire.
# Raw energy depletion stays an env fallback, not a v3 failure reward event.
failure_penalty: -20.0
# Training guard endings: stuck/slow-speed, wrong-way, progress-stalled, or timeout.
truncation_penalty: -20.0

# Damage: continuous anti-wall-grinding pressure.
damage_taken_frame_penalty: -0.02
damage_taken_streak_ramp_penalty: -0.001
damage_taken_streak_cap_frames: 120
# Damage: small entry-only penalty for collision recoil. Kept mild because other
# racers can also bump into the player.
collision_recoil_penalty: -2.0

# Boost pads: small route incentive for entering dash-pad boost, guarded so
# reversing or revisiting the same unwrapped progress region cannot farm it.
boost_pad_reward: 25.0
boost_pad_reward_progress_window: 800.0

# Energy refill: multiplier scale applied only to actual frontier-progress reward.
# No new progress means no refill reward, so recharge strips cannot be farmed by stalling.
energy_gain_reward_scale: 12.0
# Energy refill: suppress refill multipliers after damage/collision to avoid crash-refill loops.
energy_gain_collision_cooldown_frames: 240
# Energy refill: max once-per-lap bonus for reaching full energy from below.
# The payout is scaled by the recovered energy fraction since the last full
# state, so a tiny scratch/refill cannot collect the full bonus.
energy_full_refill_lap_bonus: 10.0
# Energy refill: require at least this much recovered energy before the flat
# full-refill bonus can fire. At 0.10 and bonus 10, the threshold payout is 1.
energy_full_refill_min_gain_fraction: 0.10

# Gas: optional per-frame penalty for requesting less than the threshold.
# Disabled at 0.0; with threshold 0.5, discrete idle gas gets the full penalty.
gas_underuse_penalty: -0.005
gas_underuse_threshold: 0.5

# Steering: acceleration penalty for rapid direction changes.
# This compares steer_t - 2*steer_t-1 + steer_t-2 once per policy decision.
# Smooth ramps and steady cornering are near zero; left-right flips hit the cap.
steer_oscillation_penalty: -0.0
steer_oscillation_deadzone: 0.07
steer_oscillation_cap: 2.0
steer_oscillation_power: 2.0

# Lean: discourage using Z/R lean below useful high-speed ranges without hard-masking it.
lean_low_speed_penalty: -0.01
lean_low_speed_penalty_max_speed_kph: 990.0

# Airborne: event reward when an airborne machine lands back on the track.
airborne_landing_reward: 0.0
